name: Build AIDbg

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_platform: x64
            artifact_suffix: dp64
            display_name: "64-bit (x64dbg)"
          - arch: x86
            cmake_platform: Win32
            artifact_suffix: dp32
            display_name: "32-bit (x32dbg)"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          Write-Host "=== Verifying required source files ==="
          $required = @(
            "CMakeLists.txt",
            "src/pluginmain.cpp",
            "src/pluginmain.h",
            "src/plugin.cpp",
            "src/plugin.h",
            "src/utils/Logger.h",
            "src/utils/HttpClient.h",
            "src/utils/HttpClient.cpp",
            "src/utils/ConfigManager.h",
            "src/utils/ConfigManager.cpp",
            "src/llm/ILLMProvider.h",
            "src/llm/ProviderRegistry.h",
            "src/llm/ProviderRegistry.cpp",
            "src/llm/GLMProvider.h",
            "src/llm/GLMProvider.cpp",
            "src/llm/OpenAIProvider.h",
            "src/llm/OpenAIProvider.cpp",
            "src/llm/OllamaProvider.h",
            "src/llm/OllamaProvider.cpp",
            "src/core/ContextCollector.h",
            "src/core/ContextCollector.cpp",
            "src/commands/AICommands.h",
            "src/commands/AICommands.cpp",
            "src/ui/SettingsDialog.h",
            "src/ui/SettingsDialog.cpp"
          )
          $missing = @()
          foreach ($f in $required) {
            if (Test-Path $f) {
              Write-Host "  OK: $f"
            } else {
              Write-Host "  MISSING: $f" -ForegroundColor Red
              $missing += $f
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host ""
            Write-Host "ERROR: $($missing.Count) file(s) missing!" -ForegroundColor Red
            Write-Host "These files were not uploaded to the repository."
            Write-Host "Please re-upload the entire AIDbg-source directory."
            exit 1
          }
          Write-Host ""
          Write-Host "All $($required.Count) required files present." -ForegroundColor Green
        shell: pwsh

      - name: Configure CMake
        run: cmake -B build -A ${{ matrix.cmake_platform }} -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        run: cmake --build build --config Release

      - name: Verify output exists
        run: |
          Write-Host "=== Listing build output ==="
          Get-ChildItem -Path build/Release -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
          $plugin = "build/Release/AIDbg.${{ matrix.artifact_suffix }}"
          if (-not (Test-Path $plugin)) {
            Write-Host "ERROR: Plugin file not found: $plugin" -ForegroundColor Red
            Write-Host "Build may have failed. Check the build log above."
            exit 1
          }
          $size = (Get-Item $plugin).Length
          Write-Host "OK: $plugin exists ($size bytes)" -ForegroundColor Green
        shell: pwsh

      - name: Package plugin (with prompts and docs)
        run: |
          Write-Host "=== Packaging ==="
          New-Item -ItemType Directory -Force -Path package/prompts | Out-Null
          Copy-Item build/Release/AIDbg.${{ matrix.artifact_suffix }} package/
          if (Test-Path prompts) {
            Copy-Item prompts/* package/prompts/ -Recurse -ErrorAction SilentlyContinue
          }
          if (Test-Path README.md) { Copy-Item README.md package/ }
          if (Test-Path BUILD_VS2022.md) { Copy-Item BUILD_VS2022.md package/ }
          if (Test-Path GITHUB_ACTIONS_GUIDE.md) { Copy-Item GITHUB_ACTIONS_GUIDE.md package/ }
          Compress-Archive -Path package/* -DestinationPath AIDbg-${{ matrix.arch }}.zip -Force
          Write-Host "Package created: AIDbg-${{ matrix.arch }}.zip"
          Get-ChildItem AIDbg-${{ matrix.arch }}.zip | Format-Table Name, Length
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDbg-${{ matrix.arch }}
          path: |
            build/Release/AIDbg.${{ matrix.artifact_suffix }}
            AIDbg-${{ matrix.arch }}.zip
          retention-days: 90

      - name: Print build summary
        run: |
          Write-Host "========================================"
          Write-Host "  Build Summary: AIDbg ${{ matrix.display_name }}"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Plugin file: build/Release/AIDbg.${{ matrix.artifact_suffix }}"
          Write-Host "Package:     AIDbg-${{ matrix.arch }}.zip"
          Write-Host ""
          Write-Host "Next steps:"
          Write-Host "  1. Download the artifact from the workflow run page"
          Write-Host "  2. Extract the .zip"
          if ('${{ matrix.arch }}' -eq 'x64') {
            Write-Host "  3. Copy AIDbg.${{ matrix.artifact_suffix }} to: <x64dbg>\x64\plugins\"
          } else {
            Write-Host "  3. Copy AIDbg.${{ matrix.artifact_suffix }} to: <x64dbg>\x32\plugins\"
          }
          Write-Host "  4. Launch x64dbg and run 'ai config' to set API key"
          Write-Host ""
          Write-Host "Done!"
        shell: pwsh

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f
          mkdir -p release
          find artifacts -name "*.zip" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AIDbg ${{ github.ref_name }}
          body: |
            # AIDbg ${{ github.ref_name }}

            ## Downloads
            - **AIDbg-x64.zip** - 64-bit plugin (AIDbg.dp64) for x64dbg
            - **AIDbg-x86.zip** - 32-bit plugin (AIDbg.dp32) for x32dbg

            ## Installation
            1. Download and extract the appropriate zip for your architecture
            2. Copy `AIDbg.dp64` to `<x64dbg>\x64\plugins\` (or `AIDbg.dp32` to `<x64dbg>\x32\plugins\`)
            3. Launch x64dbg
            4. Run `ai config` in the command bar to set up your API key
            5. Right-click in the disassembly view to access AI features

            ## Quick test
            ```
            ai ask "What is ROP attack?"
            ai explain
            ai vuln
            ```

            ## Full documentation
            See the README.md and BUILD_VS2022.md in the zip package.
          files: |
            release/*.zip
          draft: false
          prerelease: false
